; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs =
	      secrets.ini
	      local.ini
default_envs = wifi_node32s

[env:node32s]
platform = espressif32
framework = arduino
board = esp32dev # node32s
board_build.filesystem = littlefs
monitor_speed = 115200
check_tool = clangtidy
monitor_filters = esp32_exception_decoder
build_type = release
#lib_deps =
#	chl33/og3@^0.4.5
#	chl33/og3x-oled@^0.3.1
#	chl33/og3x-shtc3@^0.3.0
lib_deps =
	symlink://../og3
	symlink://../og3x-oled
	symlink://../og3x-shtc3
	adafruit/Adafruit SHTC3 Library
	adafruit/Adafruit Unified Sensor
	adafruit/Adafruit BusIO
	bakercp/CRC32
	bblanchon/ArduinoJson@^7.0.0
	elims/PsychicMqttClient@^0.2.4
	hoeken/PsychicHttp@^2.1.1
	thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.1
	SPI
	Wire

build_flags =
	'-Wall'
	${local.build_flags}
	'-D OTA_PASSWORD="${secrets.otaPassword}"'
lib_ldf_mode = chain+
lib_compat_mode = strict

[env:usb_node32s]
extends = env:node32s
upload_protocol = esptool
upload_port = /dev/ttyUSB0

[env:wifi_node32s]
extends = env:node32s
upload_protocol = espota
upload_port = '${secrets.uploadPort}'
upload_flags =
        ${local.wifi_upload_flags}
	--auth='${secrets.otaPassword}'
