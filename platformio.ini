; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = src
extra_configs =
	      secrets.ini
	      local.ini

[node32s]
platform = espressif32
framework = arduino
board = esp32dev
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv
monitor_speed = 115200
check_tool = cppcheck
check_skip_packages = yes
monitor_filters = esp32_exception_decoder
build_type = release
lib_deps =
	symlink://../og3
	symlink://../og3x-oled
	symlink://../og3x-shtc3
	adafruit/Adafruit BusIO
	adafruit/Adafruit SHTC3 Library
	adafruit/Adafruit Unified Sensor
	bakercp/CRC32
	bblanchon/ArduinoJson@^7.0.0
	elims/PsychicMqttClient@^0.2.4
	hoeken/PsychicHttp@^2.1.1
	thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.1
	SPI
	Wire
	WiFi

build_flags =
	${local.build_flags}
	'-Wall'
	'-D OTA_PASSWORD="${secrets.otaPassword}"'
lib_ldf_mode = deep+
lib_compat_mode = strict

[env:usb_node32s]
extends = node32s
upload_protocol = esptool
upload_port = /dev/ttyUSB0

[env:wifi_node32s]
extends = node32s
upload_protocol = espota
upload_port = ${local.uploadPort}
upload_flags =
        ${local.wifi_upload_flags}
	--auth='${secrets.otaPassword}'

[env:native]
platform = native
build_flags = -std=c++11 -D NATIVE
lib_ldf_mode = deep+
lib_compat_mode = strict
lib_deps =
	bblanchon/ArduinoJson@^7.0.0
	fabiobatsilva/ArduinoFake@^0.4.0
	symlink://../og3
