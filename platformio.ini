; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[local]
build_flags =
upload_flags =

[platformio]
extra_configs =
	      secrets.ini

[env:node32s]
platform = espressif32
framework = arduino
board = esp32dev # node32s
board_build.filesystem = littlefs
monitor_speed = 115200
check_tool = clangtidy
monitor_filters = esp32_exception_decoder
build_type = release
#lib_deps =
#	chl33/og3@^0.4.5
#	chl33/og3x-oled@^0.3.1
#	chl33/og3x-shtc3@^0.3.0
lib_deps =
	symlink://../og3
	symlink://../og3x-oled
	symlink://../og3x-shtc3
	adafruit/Adafruit BusIO
	adafruit/Adafruit SHTC3 Library
	adafruit/Adafruit Unified Sensor
	bakercp/CRC32
	bblanchon/ArduinoJson@^7.0.0
	elims/PsychicMqttClient@^0.2.4
	hoeken/PsychicHttp@^1.2.1
	thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.1
	SPI
	Wire

build_flags =
	'-Wall'
	${local.build_flags}
	'-D OTA_PASSWORD="${secrets.otaPassword}"'
;	'-DASYNC_TCP_SSL_ENABLED=1'
upload_protocol = ${secrets.uploadProtocol}
upload_port = ${secrets.uploadPort}
upload_flags =
	${local.upload_flags}
	${secrets.uploadAuth}
lib_ldf_mode = deep+
lib_compat_mode = strict
